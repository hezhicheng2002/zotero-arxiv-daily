name: Sync Upstream Branch

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

concurrency:
  group: sync-upstream-branch
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync upstream/main to origin/upstream-main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/TideDra/zotero-arxiv-daily.git 2>/dev/null || true
          git fetch upstream main

          git checkout -B upstream-main upstream/main
          git push --force-with-lease origin upstream-main